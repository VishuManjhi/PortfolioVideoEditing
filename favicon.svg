<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="Video editing favicon">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ffd166"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#g)" filter="url(#s)" />

  <!-- Film strip (subtle) -->
  <rect x="8" y="18" width="48" height="28" rx="4" fill="#000000" fill-opacity="0.08" />
  <g fill="#000000" fill-opacity="0.12">
    <rect x="12" y="22" width="4" height="6" rx="1" />
    <rect x="12" y="36" width="4" height="6" rx="1" />
    <rect x="48" y="22" width="4" height="6" rx="1" />
    <rect x="48" y="36" width="4" height="6" rx="1" />
  </g>

  <!-- Play triangle -->
  <polygon points="26,20 46,32 26,44" fill="#ffffff" />

  <!-- Center rounded rectangle to suggest a film frame -->
  <rect x="18" y="16" width="28" height="32" rx="3" fill="#ffffff" fill-opacity="0.06" />

</svg>